{% extends "base.html" %}

{% from 'components/category-card.html' import category_card %}

{% block content %}
    <div style="display: grid; justify-content: space-evenly; grid-template-columns: repeat(auto-fill, 400px); grid-gap: 10px">
        {% for category, posts in categories.items() %}
            {{ category_card(category, posts) }}
        {% endfor %}
    </div>
{% endblock %}
