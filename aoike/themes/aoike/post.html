{% extends "base.html" %}

{%- block title %}
    <title>aoike - {% if meta.title %}{{ meta.title }}{% endif %}</title>
{%- endblock %}


{% block content %}
    <h1>{{ meta.title }}</h1>
    {{ meta.date }}<br/>
    <div style="display: flex; gap: 2px;">
        Tags: {% for tag in meta.tags %}
        <span>{{ tag }}</span>
    {% endfor %}
    </div>
    {{ content }}
    {% include "components/comment.html" %}
{% endblock %}
