{% macro category_card(category, posts) -%}

        <span style="font-size: 125%;">{{ category }}</span>
        {% for post in posts %}
            <a href="{{ post.url }}">{{ post.meta.title }}</a>

        {% endfor %}
    </div>
{%- endmacro %}
