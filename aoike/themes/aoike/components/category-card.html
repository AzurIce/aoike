{% macro category_card(category, posts) -%}
    <div class="category_card">
        <div style="font-size: 125%; display: flex; align-content: center; gap: 4px">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20"><path fill="none" d="M0 0h24v24H0z"/><path d="M22 11v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-9h20zm0-2H2V4a1 1 0 0 1 1-1h7.414l2 2H21a1 1 0 0 1 1 1v3z"/></svg>
            {{ category }}
        </div>
        <div style="display: flex; flex-direction: column; gap: 4px; padding-left: 10px;">
            {% for post in posts %}
                {% if post.is_draft %}
                    <div>
                        <a href="{{ post.url }}" class="draft">{{ post.meta.title }}<sup>draft</sup></a>
                    </div>
                {% else %}
                    <a href="{{ post.url }}">{{ post.meta.title }}</a>
                {% endif %}
    {#            <div style="display: flex; gap: 4px; color: #777777;">#}
    {#                <span>Date: {{ post.meta.date }}</span>#}
    {#                <span>Tags: {{ post.meta.tags }}</span>#}
    {#            </div>#}
            {% endfor %}
        </div>
    </div>
{%- endmacro %}
